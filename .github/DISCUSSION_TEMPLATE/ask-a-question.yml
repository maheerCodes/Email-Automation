title: "[Q&A]: "
labels: ["question", "help wanted"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reaching out! Please describe your question or issue in detail below.
  - type: textarea
    id: question
    attributes:
      label: What is your question?
      description: Be as specific as possible.
    validations:
      required: true
  - type: input
    id: n8n-version
    attributes:
      label: n8n Version
      placeholder: e.g. 1.40.0
